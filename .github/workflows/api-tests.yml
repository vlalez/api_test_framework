name: API Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
jobs:
  tests:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/setup-checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependecies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest -v
